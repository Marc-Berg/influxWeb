name: Sync fork with upstream

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          repo="MyHomeMyData/influxWeb"
          git remote add upstream "https://github.com/${repo}.git"

      - name: Fetch origin and upstream
        run: |
          git fetch origin main
          git fetch upstream main

      - name: Mirror upstream main into fork main
        run: |
          origin_sha="$(git rev-parse refs/remotes/origin/main)"
          upstream_sha="$(git rev-parse upstream/main)"

          if [ "$upstream_sha" = "$origin_sha" ]; then
            echo "Fork is already up to date."
            exit 0
          fi

          git checkout -B main upstream/main
          git push --force-with-lease origin main
