name: Sync fork with upstream

on:
  schedule:
    - cron: "37 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Use PAT for push (triggers downstream workflows)
        env:
          SYNC_PUSH_TOKEN: ${{ secrets.SYNC_PUSH_TOKEN }}
        run: |
          if [ -n "$SYNC_PUSH_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:${SYNC_PUSH_TOKEN}@github.com/${{ github.repository }}.git"
          else
            echo "SYNC_PUSH_TOKEN not set; using default GITHUB_TOKEN."
          fi

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          repo="MyHomeMyData/influxWeb"
          git remote add upstream "https://github.com/${repo}.git"

      - name: Fetch origin and upstream
        run: |
          git fetch origin main
          git fetch upstream main

      - name: Merge upstream main into fork main
        id: merge_upstream
        continue-on-error: true
        run: |
          origin_sha="$(git rev-parse refs/remotes/origin/main)"
          upstream_sha="$(git rev-parse upstream/main)"

          if [ "$upstream_sha" = "$origin_sha" ]; then
            echo "Fork is already up to date."
            exit 0
          fi

          git checkout main
          git merge --no-edit upstream/main
          git push origin main

      - name: Create issue on merge conflict
        if: steps.merge_upstream.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Upstream sync conflict on main';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-sync-conflict',
              per_page: 100,
            });

            const existing = issues.find(i => i.title === title);
            if (existing) {
              core.info(`Issue already exists: #${existing.number}`);
              return;
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'Automatic upstream sync failed due to a merge conflict.',
              '',
              '- Upstream: `MyHomeMyData/influxWeb`',
              '- Branch: `main`',
              `- Workflow run: ${runUrl}`,
              '',
              'Manual action required:',
              '1. Merge/rebase upstream changes locally.',
              '2. Resolve conflicts.',
              '3. Push to `main`.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['upstream-sync-conflict'],
            });

      - name: Fail after conflict issue creation
        if: steps.merge_upstream.outcome == 'failure'
        run: exit 1
