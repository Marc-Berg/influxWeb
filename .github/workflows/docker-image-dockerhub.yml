name: Build and publish Docker image (Docker Hub)

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dockerhub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare image name
        id: image
        run: echo "name=${DOCKER_USERNAME,,}/influxweb" >> "$GITHUB_OUTPUT"
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

      - name: Read app version tag
        id: version
        run: |
          version="$(python -c "import pathlib,re; t=pathlib.Path('app/version.py').read_text(); m=re.search(r'__version__\\s*=\\s*[\"\']([^\"\']+)[\"\']', t); print(m.group(1))")"
          short="$(python -c "v='${version}'.split('.'); print('.'.join(v[:2]) if len(v) >= 2 else '${version}')")"
          echo "tag=${short}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.tag }}
