services:
  influxweb:
    image: influxweb:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      INFLUX_URL: http://host.docker.internal:8086
      INFLUX_TOKEN: replace-with-real-token
      INFLUX_ORG: replace-with-real-org
      BIND_HOST: 0.0.0.0
      BIND_PORT: 8085
      LOG_LEVEL: info
    ports:
      - "8085:8085"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
